---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-producer-app
  namespace: producer-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-producer
  template:
    metadata:
      labels:
        app: kafka-producer
    spec:
      containers:
      - name: producer
        image: confluentinc/cp-server:7.9.0
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e

            echo "Creating PKCS12 truststore..."
            keytool -importcert \
              -alias kafka-ca \
              -file /etc/tls-certs/ca.crt \
              -keystore /tmp/truststore.p12 \
              -storetype PKCS12 \
              -storepass Dexter@123 \
              -noprompt

            echo "Creating PKCS12 keystore..."
            openssl pkcs12 -export \
              -in /etc/tls-certs/tls.crt \
              -inkey /etc/tls-certs/tls.key \
              -out /tmp/keystore.p12 \
              -name kafka-client \
              -passout pass:Dexter@123

            cat <<EOF >/tmp/client.properties
            bootstrap.servers=kafka.confluent.svc.cluster.local:9071
            security.protocol=SSL

            ssl.truststore.type=PKCS12
            ssl.truststore.location=/tmp/truststore.p12
            ssl.truststore.password=Dexter@123

            ssl.keystore.type=PKCS12
            ssl.keystore.location=/tmp/keystore.p12
            ssl.keystore.password=Dexter@123
            ssl.key.password=Dexter@123
            EOF

            cat /tmp/client.properties

            while true; do
              echo "Message sent at $(date)" | kafka-console-producer \
                --bootstrap-server kafka.confluent.svc.cluster.local:9071 \
                --topic demo-topic \
                --producer.config /tmp/client.properties
              sleep 5
            done

        volumeMounts:
        - name: tls-assets
          mountPath: /etc/tls-certs
          readOnly: true

      volumes:
      - name: tls-assets
        secret:
          secretName: tls-kafka

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-consumer-app
  namespace: producer-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-consumer
  template:
    metadata:
      labels:
        app: kafka-consumer
    spec:
      containers:
      - name: consumer
        image: confluentinc/cp-server:7.9.0
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e

            echo "Creating PKCS12 truststore..."
            keytool -importcert \
              -alias kafka-ca \
              -file /etc/tls-certs/ca.crt \
              -keystore /tmp/truststore.p12 \
              -storetype PKCS12 \
              -storepass Dexter@123 \
              -noprompt

            echo "Creating PKCS12 keystore..."
            openssl pkcs12 -export \
              -in /etc/tls-certs/tls.crt \
              -inkey /etc/tls-certs/tls.key \
              -out /tmp/keystore.p12 \
              -name kafka-client \
              -passout pass:Dexter@123

            cat <<EOF >/tmp/client.properties
            bootstrap.servers=kafka.confluent.svc.cluster.local:9071
            security.protocol=SSL

            ssl.truststore.type=PKCS12
            ssl.truststore.location=/tmp/truststore.p12
            ssl.truststore.password=Dexter@123

            ssl.keystore.type=PKCS12
            ssl.keystore.location=/tmp/keystore.p12
            ssl.keystore.password=Dexter@123
            ssl.key.password=Dexter@123

            group.id=aks-demo-consumer-group
            auto.offset.reset=earliest
            EOF

            cat /tmp/client.properties

            kafka-console-consumer \
              --bootstrap-server kafka.confluent.svc.cluster.local:9071 \
              --topic demo-topic \
              --consumer.config /tmp/client.properties

        volumeMounts:
        - name: tls-assets
          mountPath: /etc/tls-certs
          readOnly: true

      volumes:
      - name: tls-assets
        secret:
          secretName: tls-kafka
