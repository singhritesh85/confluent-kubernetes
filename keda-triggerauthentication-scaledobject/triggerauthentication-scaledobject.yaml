apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: kafka-mtls-auth
  namespace: producer-consumer
spec:
  secretTargetRef:
  - parameter: ca
    name: keda-kafka-mtls
    key: ca.crt
  - parameter: cert
    name: keda-kafka-mtls
    key: tls.crt
  - parameter: key
    name: keda-kafka-mtls
    key: tls.key
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: kafka-consumer-scaler
  namespace: producer-consumer
spec:
  scaleTargetRef:
    name: kafka-consumer-app
  minReplicaCount: 1
  maxReplicaCount: 5
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
  - type: kafka
    authenticationRef:
      name: kafka-mtls-auth
    metadata:
      bootstrapServers: kafka.confluent.svc.cluster.local:9071
      topic: demo-topic
      consumerGroup: aks-demo-consumer-group
      lagThreshold: "1"
      tls: "enable"
